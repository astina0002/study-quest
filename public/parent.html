<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Quest - 保護者ページ</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/parent.css">
</head>
<body class="parent-body">
  <div class="app">
    <header class="header parent-header">
      <div class="header-title">
        <span class="header-icon">&#x1F6E1;&#xFE0F;</span>
        <h1>保護者管理</h1>
      </div>
      <div class="header-actions">
        <a href="/" class="back-link">&#x2190; 子供ページへ</a>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
      </div>
    </header>

    <!-- Child Name Setting -->
    <section class="parent-section">
      <h2>&#x1F9D2; 子供の名前</h2>
      <div class="input-group">
        <input type="text" id="childNameInput" placeholder="名前を入力">
        <button onclick="updateChildName()">保存</button>
      </div>
    </section>

    <!-- Quest Name Setting -->
    <section class="parent-section">
      <h2>&#x270F;&#xFE0F; クエスト名</h2>
      <div class="input-group">
        <input type="text" id="questNameInput" placeholder="今日の勉強ミッション">
        <button onclick="updateQuestName()">保存</button>
      </div>
    </section>

    <!-- Weekly Status & Confirm -->
    <section class="parent-section">
      <h2>&#x1F4C5; 今週の状況</h2>
      <div class="parent-week" id="parentWeek"></div>
    </section>

    <!-- Reward Config (Days 1-4) -->
    <section class="parent-section">
      <h2>&#x1F381; リワード設定</h2>
      <p class="note">※ 各日の達成ボーナスを設定できます（種類: 現金 or Robux）</p>
      <div id="rewardConfig"></div>
      <button class="save-btn" onclick="saveRewards()">リワード保存</button>
    </section>

    <!-- Monthly Target & Wishlist -->
    <section class="parent-section">
      <h2>&#x1F31F; 月間チャレンジ設定</h2>
      <div id="monthlyConfig"></div>
    </section>

    <!-- Wishlist Management -->
    <section class="parent-section">
      <h2>&#x1F4DD; 欲しいものリスト管理</h2>
      <div id="wishlistManage"></div>
    </section>

    <!-- Password Change -->
    <section class="parent-section">
      <h2>&#x1F511; パスワード変更</h2>
      <div class="input-group">
        <input type="password" id="newPassword" placeholder="新しいパスワード" inputmode="numeric">
        <button onclick="changePassword()">変更</button>
      </div>
    </section>
  </div>

  <script src="/js/parent.js"></script>
</body>
</html>
